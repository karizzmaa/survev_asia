name: Codespace Daily Scheduler

on:
  schedule:
    - cron: '40 4 * * *'
    - cron: '40 8 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'start or stop'
        required: true
        default: 'start'

jobs:
  manage-codespace:
    runs-on: ubuntu-latest

    steps:
      - name: Install latest gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
          gh --version

      - name: Determine action (scheduled vs manual)
        id: action
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "23" ]; then
            echo "action=start" >> $GITHUB_OUTPUT
          else
            echo "action=stop" >> $GITHUB_OUTPUT
          fi

      - name: Start Codespace
        if: steps.action.outputs.action == 'start'
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_TOKEN }}
        run: |
          RESPONSE=$(curl -s -L \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user/codespaces/literate-memory-q7pp6pxrgxh9g7g/start)
          echo "Start response: $RESPONSE"

      - name: Wait for codespace to be ready
        if: steps.action.outputs.action == 'start'
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_TOKEN }}
        run: |
          echo "Waiting for codespace to reach Available state..."
          for i in $(seq 1 30); do
            STATE=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/user/codespaces/literate-memory-q7pp6pxrgxh9g7g \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['state'])")
            echo "Current state: $STATE"
            if [ "$STATE" = "Available" ]; then
              echo "Codespace is ready!"
              break
            fi
            sleep 20
          done
          echo "Giving codespace extra 60s to fully initialize..."
          sleep 60

      - name: Run startup command
        if: steps.action.outputs.action == 'start'
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_TOKEN }}
        run: |
          gh codespace ssh -c literate-memory-q7pp6pxrgxh9g7g -- "cd /workspaces/survev_asia && git stash && git pull && pm2 resurrect"

      - name: Make ports public (3000, 8000, 8001)
        if: steps.action.outputs.action == 'start'
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_TOKEN }}
        run: |
          echo "Waiting 60s for pm2 apps to bind to ports..."
          sleep 60
          gh codespace ports visibility 3000:public 8000:public 8001:public -c literate-memory-q7pp6pxrgxh9g7g

      - name: Stop Codespace
        if: steps.action.outputs.action == 'stop'
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user/codespaces/literate-memory-q7pp6pxrgxh9g7g/stop
          echo "Codespace stopped."
